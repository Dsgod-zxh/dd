<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>个人简介</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: url("./bk.jpeg") center / cover fixed;
            min-height: 100vw;
            font-family: 'KAITI';
            
        }
        #background{
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .information{
            background-color: rgb(255, 255, 255,0.2);
            backdrop-filter: blur(6px);

            text-align: center;

            border-radius: 25px;
            line-height: 2px;
        }
        .touxiang{
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid  rgb(54, 161, 111);
            margin-bottom: 15px;
            margin-top: 0;
        }
        h3{
            font-size: 24px;
            margin-bottom: 12px;
            line-height: 1.05;
        }
        p{
            font-size: 14px;
            line-height: 1.8;
        }
        .enter{
            display: inline-block;
            margin-top: 25px;
            padding: 10px 36px;
            text-decoration: none;
            border-radius: 999px;
            font-size: 16px;
        }
        .enter:hover{
            background: rgba(255, 255,255,0.4);
            transform: scale(1.05);
        }
    </style>
</head>
